<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chick Hop</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to the CSS file -->
</head>
<body>

    <div id="startPage" class="container">
        <h1>Chick Hop</h1>
        <div id="welcome-back" class="welcome-back"></div>
        <input id="username-input" type="text" placeholder="Enter your username" class="username-input">
        <button class="button" onclick="startGame()">Start</button>
        <button class="button" onclick="goToShop()">Shop</button>
    </div>

    <div id="gamePage" class="container">
        <div class="score" id="score">Score: 0</div>
        <div class="game-container">
            <canvas id="gameCanvas" width="350" height="400"></canvas>
        </div>
    </div>

    <div id="gameOverPage" class="container">
        <h1>Game Over</h1>
        <div class="final-score">Final Score: <span id="final-score">0</span></div>
        <div class="high-score">High Score: <span id="high-score">0</span></div>
        <div class="coins-converted">Coins: <span id="coins-converted">0</span></div>
        <button class="button" onclick="restartGame()">Restart</button>
        <button class="button" onclick="goToShop()">Shop</button>
    </div>

    <script src="script.js"></script> <!-- Link to the JavaScript file -->
</body>
</html>
